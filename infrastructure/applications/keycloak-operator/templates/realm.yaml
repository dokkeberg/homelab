apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: home-realm-kc
spec:
  keycloakCRName: keycloak
  realm:
    realm: home
    enabled: true
    registrationAllowed: true
    users:
      - username: '{{ .Values.spec.keycloak.username }}'
        enabled: true
        createdTimestamp: 1.7592768e+12
        email: christopher.dokkeberg@gmail.com
        firstName: Christopher
        lastName: Dokkeberg
        realmRoles: 
          - default-roles-home
        credentials:
          - type: password
            value: ChangeMe123!
    clientScopes:
      - name: groups
        protocol: openid-connect
    clients:
      - clientId: argocd
        name: argocd-sso
        rootUrl: 'https://argocd.talos.home/'
        baseUrl: 'https://argocd.talos.home/'
        adminUrl: 'https://argocd.talos.home/'
        enabled: true
        clientAuthenticatorType: client-secret
        secret: '{{ .Values.spec.keycloak.clients.argocd.clientSecret }}'
        redirectUris:
          - 'https://argocd.talos.home/auth/callback'
        webOrigins:
          - 'https://argocd.talos.home/#!/'
        standardFlowEnabled: true
        frontchannelLogout: true
        protocol: openid-connect
        attributes:
          backchannel.logout.session.required: 'true'
          post.logout.redirect.uris: 'https://argocd.talos.home/applications'
          oauth2.device.authorization.grant.enabled: 'true'
        fullScopeAllowed: true
        defaultClientScopes:
          - web-origins
          - acr
          - roles
          - profile
          - groups
          - basic
          - email
