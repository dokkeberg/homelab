apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"    
spec:
  project: default
  destination:
    namespace: argocd
    server: {{ .Values.spec.destination.server }}
  sources:
  - repoURL: {{ .Values.spec.argoCd.repoUrl }}
    chart: argo-cd
    targetRevision: {{ .Values.spec.argoCd.targetRevision }}
    helm:
      releaseName: argocd
      values: |              
        configs:
          cm:
            accounts.readonly: apiKey
            oidc.tls.insecure.skip.verify: "true"
            url: {{ .Values.spec.argoCd.url }}
            kustomize.buildOptions: "--enable-helm"
            oidc.config: |
              name: Keycloak
              issuer: {{ .Values.spec.argoCd.oidc.issuer }}
              clientID: {{ .Values.spec.argoCd.oidc.clientID }}
              clientSecret: {{ .Values.spec.keycloak.clients.argocd.clientSecret }}
              requestedScopes: ["openid"]
          params:
            server.insecure: "true"
          rbac:
            policy.default: "role:admin"
            policy.csv: "g, readonly, role:readonly"
  - repoURL: {{ .Values.spec.source.repoURL }} # adds httproute
    path: {{ .Values.spec.source.argocdPath }}
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background 
      - ServerSideApply=true
      - RespectIgnoreDifferences=true