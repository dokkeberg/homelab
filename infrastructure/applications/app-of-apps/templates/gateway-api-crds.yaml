apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  source:
    repoURL: {{ .Values.spec.gatewayApi.repoUrl }}
    path: {{ .Values.spec.gatewayApi.path }}
    targetRevision: {{ .Values.spec.gatewayApi.targetRevision }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true