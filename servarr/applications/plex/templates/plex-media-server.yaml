apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plex-media-server
  namespace: plex
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: plex
      app.kubernetes.io/name: plex-media-server
  serviceName: plex-media-server
  template:
    metadata:
      labels:
        app: plex-media-server
        app.kubernetes.io/instance: plex
        app.kubernetes.io/name: plex-media-server
        
    spec:
      containers:    
        - name: plex-media-server-pms
          env:
            - name: ADVERTISE_IP
              value: https://{{ .Values.plex.host }}:443,http://192.168.1.223:32400
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Oslo"
          image: index.docker.io/plexinc/pms-docker:1.43.2.10687-563d026ea
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 32400
              name: pms
          volumeMounts:
            - mountPath: /config
              name: plex-config
            - mountPath: /transcode
              name: pms-transcode
            - mountPath: /data/tv
              name: plex-tv
              readOnly: true
            - mountPath: /data/movies
              name: plex-movies
              readOnly: true
      serviceAccountName: plex-media-server
      terminationGracePeriodSeconds: 120
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: config-pvc
        - name: pms-transcode
          emptyDir: {}
        - name: plex-tv
          persistentVolumeClaim:
            claimName: tv-pvc
        - name: plex-movies
          persistentVolumeClaim:
            claimName: movies-pvc
