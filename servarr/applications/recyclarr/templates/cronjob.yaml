apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-sync
  namespace: recyclarr
spec:
  schedule: {{ .Values.recyclarr.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: recyclarr
              image: {{ .Values.recyclarr.image | quote }}
              imagePullPolicy: IfNotPresent
              args:
                - sync
                - --config
                - /config/recyclarr.yml
              envFrom:
                - secretRef:
                    name: {{ .Values.recyclarr.secretName }}
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
