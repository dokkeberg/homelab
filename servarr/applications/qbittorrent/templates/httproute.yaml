apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - {{ .Values.qbittorrent.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: "180s"
        backendRequest: "170s"
      backendRefs:
        - name: qbittorrent
          port: 8080
          group: ""
          kind: Service
          weight: 1
