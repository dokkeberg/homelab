apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prowlarr
  namespace: prowlarr
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: prowlarr
      app.kubernetes.io/name: prowlarr
  serviceName: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
        app.kubernetes.io/instance: prowlarr
        app.kubernetes.io/name: prowlarr
        
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Oslo"
          volumeMounts:
            - mountPath: /config
              name: prowlarr-config
            - mountPath: /downloads
              name: prowlarr-downloads
      volumes:
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: data-pvc
        - name: prowlarr-downloads
          emptyDir: {}