apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
    - Usenet:
        - NZBFinder:
            - abbr: NZB
              href: https://nzbfinder.ws/
        - NewsDemon:
            - abbr: ND
              href: https://members.newsdemon.com/
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd.png
            href: {{ .Values.homepage.services.argocd.host }}
            description: GitOps CI/CD
            namespace: argocd
            app: argocd-server
            widget:
              type: argocd
              url: {{ .Values.homepage.services.argocd.host }}
              key: {{ .Values.homepage.services.argocd.key }}
    - Media:
        - Plex:
            icon: plex.png
            href: {{ .Values.homepage.services.plex.host }}
            description: Media streaming
            namespace: plex
            app: plex-media-server
            widget:
              type: plex
              url: {{ .Values.homepage.services.plex.host }}
              key: {{ .Values.homepage.services.plex.key }}
        - Radarr:
            icon: radarr.png
            href: {{ .Values.homepage.services.radarr.host }}
            description: Movies tracker
            namespace: radarr
            app: radarr
            widget:
              type: radarr
              url: {{ .Values.homepage.services.radarr.host }}
              key: {{ .Values.homepage.services.radarr.key }}
        - Sonarr:
            icon: sonarr.png
            href: {{ .Values.homepage.services.sonarr.host }}
            description: TV tracker
            namespace: sonarr
            app: sonarr
            widget:
              type: sonarr
              url: {{ .Values.homepage.services.sonarr.host }}
              key: {{ .Values.homepage.services.sonarr.key }}
    - Downloads:
        - SABnzbd:
            icon: sabnzbd.png
            href: {{ .Values.homepage.services.sabnzbd.host }}
            description: Usenet downloader
            namespace: sabnzbd
            app: sabnzbd
            widget:
              type: sabnzbd
              url: {{ .Values.homepage.services.sabnzbd.host }}
              key: {{ .Values.homepage.services.sabnzbd.key }}
        - qBittorrent:
            icon: qbittorrent.png
            href: {{ .Values.homepage.services.qbittorrent.host }}
            description: Torrent downloader
            namespace: qbittorrent
            app: qbittorrent
            widget:
              type: qbittorrent
              url: {{ .Values.homepage.services.qbittorrent.host }}
              username: {{ .Values.homepage.services.qbittorrent.username }}
              password: {{ .Values.homepage.services.qbittorrent.password }}
        - Prowlarr:
            icon: prowlarr.png
            href: {{ .Values.homepage.services.prowlarr.host }}
            description: Usenet indexer
            namespace: prowlarr
            app: prowlarr
            widget:
              type: prowlarr
              url: {{ .Values.homepage.services.prowlarr.host }}
              key: {{ .Values.homepage.services.prowlarr.key }}
    - Requests:
        - Seerr:
            icon: overseerr.png
            href: {{ .Values.homepage.services.seerr.host }}
            description: Request management
            widget:
              type: overseerr
              url: {{ .Values.homepage.services.seerr.host }}
              key: {{ .Values.homepage.services.seerr.key }}
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""